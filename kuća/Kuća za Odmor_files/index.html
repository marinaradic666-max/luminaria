<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminaria - Galerija</title>
    <style>
        body { 
            background-color: #1a1b1b; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px 20px; 
        }
        h1 { color: #ffcc00; font-size: 3em; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 40px; }
        .galerija { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        .okvir {
            background: #252626;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #444;
            transition: transform 0.3s;
        }
        .okvir:hover { transform: scale(1.03); border-color: #ffcc00; }
        img { 
            width: 300px; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <h1>Luminaria</h1>
    <p>Dobrodošli u moju galeriju slika</p>

    <div class="galerija">
        <!-- Provjeri jesu li imena slika točno ovakva u tvom GitHub popisu -->
        <div class="okvir"><img src="unutra.jpg"></div>
        <div class="okvir"><img src="krov.jpg"></div>
        <div class="okvir"><img src="prozor.jpg"></div>
        <div class="okvir"><img src="Slika (1).jpg"></div>
        <div class="okvir"><img src="Slika (2).jpg"></div>
        <div class="okvir"><img src="Slika (3).jpg"></div>
    </div>

</body>
</html>
